# Railway — API service
# Dashboard: set Root Directory = steam-genie (if repo root is APP-SG)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
preDeployCommand = "sh /app/scripts/railway-release.sh"
